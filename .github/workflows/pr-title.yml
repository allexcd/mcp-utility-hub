name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            hotfix
          requireScope: false
          subjectPattern: ^(\[[A-Z0-9]+-[0-9]+\] - )?[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must optionally start with a ticket ID, followed by lowercase description, not ending with a period.
            Example: "feat: add npm publish workflow" or "feat: [PROJ-123] - add npm publish workflow"
